# Mosquitto MQTT Broker Configuration
# AI Care Companion 프로젝트용

# 기본 리스너 (MQTT)
listener 1883
protocol mqtt

# WebSocket 리스너
listener 9001
protocol websockets

# 인증 설정 (개발 환경에서는 익명 허용)
allow_anonymous true

# 로깅
log_type all
log_dest stdout

# 영속성
persistence true
persistence_location /mosquitto/data/

# 메시지 크기 제한
max_packet_size 1048576

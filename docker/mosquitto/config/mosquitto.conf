# Mosquitto Configuration
# AI Care Companion MQTT Broker

# 리스너 설정
listener 1883
protocol mqtt

listener 9001
protocol websockets

# 인증 (개발 환경에서는 익명 허용)
allow_anonymous true

# 로깅
log_dest stdout
log_type all
connection_messages true
log_timestamp true

# 지속성
persistence true
persistence_location /mosquitto/data/

# 메시지 크기 제한 (256KB)
message_size_limit 262144
